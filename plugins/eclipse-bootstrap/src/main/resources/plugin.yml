name: Eclipse
version: ${version}
main: dev.modichamiya.eclipse.bootstrap.EclipsePlugin
api-version: '1.21'
authors: [Modiji]
commands:
  eclipse:
    description: Project Eclipse admin command suite
    usage: /eclipse <reload|module list|profile|content ...|assets ...|timeline ...|gui ...|world ...|progression ...|item ...>
    permission: eclipse.admin
permissions:
  eclipse.admin:
    description: Grants access to Project Eclipse admin commands
    default: op
